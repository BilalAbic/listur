name: Dependency Audit

on:
  pull_request:
    branches: [development, production]
  schedule:
    - cron: '0 9 * * *' # Her gün sabah 09:00'da

jobs:
  audit:
    name: pnpm Audit Security
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run audit
        id: audit_check
        run: |
          pnpm audit --audit-level moderate
        continue-on-error: true

      - name: Post Audit Results to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const outcome = '${{ steps.audit_check.outcome }}';
            const icon = outcome === 'success' ? '✅' : '🚨';
            let body = `## 📦 Bağımlılık Güvenlik Kontrolü (pnpm audit)\n\n`;
            
            if (outcome === 'success') {
              body += `✅ **Harika!** Bağımlılık paketlerinde bilinen herhangi bir güvenlik açığı bulunamadı.\n`;
            } else {
              body += `🚨 **Dikkat!** Bağımlılık paketlerinde güvenlik açıkları tespit edildi.\n\n`;
              body += `Lütfen yerelde \`pnpm audit\` çalıştırarak paketleri güncelleyin.\n`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
