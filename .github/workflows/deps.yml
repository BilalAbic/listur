name: Dependency Audit

on:
  pull_request:
    branches: [development, production]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deps.yml'
  schedule:
    # Haftalık (Pazartesi 09:00 UTC) — günlük cron free tier'da gereksiz dakika harcıyordu
    - cron: '0 9 * * 1'

concurrency:
  group: deps-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: pnpm Audit Security
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run audit
        id: audit_check
        run: |
          set +e
          pnpm audit --audit-level moderate --json > audit.json
          AUDIT_EXIT=$?
          # Çıktı her durumda audit.json'a yazılır; exit kodunu output'a aktar
          echo "exit_code=${AUDIT_EXIT}" >> "$GITHUB_OUTPUT"
          # Step başarısı: critical/high yoksa pass
          exit 0

      - name: Build Sticky Audit Body
        id: report
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const core = require('@actions/core');
            let body = '## 📦 Bağımlılık Güvenlik Kontrolü (pnpm audit)\n\n';

            let hasVulns = false;
            let totalVulns = 0;
            let bySeverity = { critical: 0, high: 0, moderate: 0, low: 0 };
            let advisories = [];

            try {
              const raw = fs.readFileSync('audit.json', 'utf8').trim();
              if (raw) {
                const data = JSON.parse(raw);
                // pnpm audit --json çıktısı: { advisories: { id: {...} }, metadata: { vulnerabilities: {...} } }
                if (data.metadata && data.metadata.vulnerabilities) {
                  bySeverity = { ...bySeverity, ...data.metadata.vulnerabilities };
                  totalVulns = Object.values(bySeverity).reduce((a, b) => a + b, 0);
                  hasVulns = totalVulns > 0;
                }
                if (data.advisories) {
                  advisories = Object.values(data.advisories);
                }
              }
            } catch (e) {
              body += `⚠️ Audit çıktısı parse edilemedi: ${e.message}\n\n`;
            }

            if (!hasVulns) {
              body += '✅ **Harika!** Bağımlılık paketlerinde bilinen herhangi bir güvenlik açığı bulunamadı.\n';
            } else {
              const blocker = bySeverity.critical > 0 || bySeverity.high > 0;
              const icon = blocker ? '🚨' : '⚠️';
              body += `${icon} **${totalVulns} güvenlik açığı tespit edildi.**\n\n`;
              body += `| Critical | High | Moderate | Low |\n|---|---|---|---|\n`;
              body += `| ${bySeverity.critical} | ${bySeverity.high} | ${bySeverity.moderate} | ${bySeverity.low} |\n\n`;

              if (advisories.length > 0) {
                body += '<details><summary>📋 Detaylı Advisory Listesi (ilk 10)</summary>\n\n';
                body += '| Paket | Severity | Açıklama | Fix |\n|---|---|---|---|\n';
                advisories.slice(0, 10).forEach(a => {
                  const fix = a.patched_versions || a.fixed_in || '—';
                  body += `| \`${a.module_name || a.name || '?'}\` | ${a.severity} | ${(a.title || '').slice(0, 60)} | ${fix} |\n`;
                });
                body += '\n</details>\n\n';
              }

              body += `Yerelde \`pnpm audit\` çalıştırarak güncelleyin veya \`pnpm update\` deneyin.\n`;
            }

            core.setOutput('body', body);
            core.setOutput('has_blocker', String(bySeverity.critical > 0 || bySeverity.high > 0));

      - name: Post Sticky Comment to PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pnpm-audit
          message: ${{ steps.report.outputs.body }}

      - name: Fail on critical/high
        if: steps.report.outputs.has_blocker == 'true'
        run: |
          echo "::error::Critical veya high severity güvenlik açığı tespit edildi."
          exit 1
