name: CodeQL Security

on:
  pull_request:
    branches: [development, production]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'supabase/migrations/**'
      - '**.sql'
      - '.github/ISSUE_TEMPLATE/**'
  push:
    branches: [development, production]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'supabase/migrations/**'
      - '**.sql'
  schedule:
    - cron: '30 1 * * 1' # Her Pazartesi 01:30'da çalışır

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # NOT: CodeQL v3 Aralık 2026'da deprecate olacak. v4 geçişi ayrı bir issue
      # olarak ele alınacak — şu an JS/TS için v3 ile aynı kurallar çalışıyor.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
          # JS/TS için build gerekmez — varsayılan tracing yeterli
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
