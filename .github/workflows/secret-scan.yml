name: Secret Scan (Gitleaks)

on:
  pull_request:
    branches: [development, production]
  push:
    branches: [development, production]

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks Diff Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Gitleaks PR mode için tam geçmiş gerek — fetch-depth 0
          fetch-depth: 0

      - name: Write custom Gitleaks config
        run: |
          cat > .gitleaks.toml <<'EOF'
          # Listur custom kural seti
          # Resmi default config'i extend eder.

          [extend]
          useDefault = true

          # Supabase service_role JWT (eyJ ile başlayan + uzun)
          # NOT: anon key de aynı pattern'e uyar; .env*'ler allowlist'lenir.
          [[rules]]
          id = "supabase-service-role-key"
          description = "Supabase service_role veya anon JWT key tespit edildi"
          regex = '''eyJ[A-Za-z0-9_\-]{20,}\.eyJ[A-Za-z0-9_\-]{20,}\.[A-Za-z0-9_\-]{20,}'''
          tags = ["jwt", "supabase"]

          # OpenAI API key — sk- veya sk-proj- prefix'i
          [[rules]]
          id = "openai-api-key"
          description = "OpenAI API key tespit edildi"
          regex = '''sk-(proj-)?[A-Za-z0-9_-]{20,}'''
          keywords = ["sk-"]
          tags = ["openai"]

          # Genel: SUPABASE_SERVICE_ROLE_KEY veya OPENAI_API_KEY = "..."
          [[rules]]
          id = "env-var-secret-assignment"
          description = "Bilinen kritik env değişkeni inline atama"
          regex = '''(?i)(SUPABASE_SERVICE_ROLE_KEY|OPENAI_API_KEY)\s*=\s*['"]?[A-Za-z0-9_\-]{20,}'''
          tags = ["env"]

          [allowlist]
          description = "Listur false positive allowlist"
          paths = [
            '''(.*?)\.env\.development$''',
            '''(.*?)\.env\.production$''',
            '''(.*?)\.env\.local$''',
            '''(.*?)\.env\.example$''',
            '''(.*?)package-lock\.json$''',
            '''(.*?)pnpm-lock\.yaml$''',
            '''docs/.*\.md$''',
            '''CLAUDE\.md$''',
          ]
          # Placeholder değerleri / örnek key'leri allowlist'le
          regexes = [
            '''(?i)placeholder''',
            '''(?i)your[-_]?(api[-_]?)?key''',
            '''eyJ\.example\.example''',
          ]
          EOF

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Listur custom config'i kullan
          GITLEAKS_CONFIG: .gitleaks.toml
          # PR'da sadece diff scan (hızlı), push'ta tam scan
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Build Sticky Comment Body
        if: always() && github.event_name == 'pull_request'
        id: report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // NOT: github-script@v7 `core`, `github`, `context`, `glob`, `io`, `exec`, `fetch` global'lerini otomatik enjekte eder; require ETMEYİN — "Identifier already declared" verir.
            const conclusion = '${{ steps.gitleaks.outcome }}';
            let body = '## 🔐 Secret Scan (Gitleaks)\n\n';

            if (conclusion === 'success') {
              body += '✅ **Temiz** — Bu PR diff\'inde Supabase service role key, OpenAI API key veya başka bir secret tespit edilmedi.\n\n';
              body += '_Custom kurallar: `supabase-service-role-key`, `openai-api-key`, `env-var-secret-assignment` + Gitleaks default rule seti._';
            } else {
              body += '🚨 **Secret tespit edildi!** PR\'ı mergelemeden önce sızıntıyı temizleyin.\n\n';
              body += '### Yapılacaklar\n';
              body += '1. Yukarıdaki Gitleaks bulgu yorumlarına bakın.\n';
              body += '2. Sızdırılan anahtarı **derhal rotate edin** (Supabase Dashboard / OpenAI Console).\n';
              body += '3. İlgili satırı koddan kaldırıp `.env.local` veya GitHub Secrets\'a taşıyın.\n';
              body += '4. `git rebase -i` ile sızıntı içeren commit\'leri yeniden yazın **veya** force-push gerektiriyorsa branch\'i sil + yeni branch ile aç.\n';
              body += '5. Workflow log\'undaki artifact\'i inceleyin (`gitleaks-report.json`).\n';
            }

            core.setOutput('body', body);

      - name: Post Sticky Comment to PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: gitleaks
          message: ${{ steps.report.outputs.body }}
